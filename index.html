<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Photo Editor & Printer</title>
    <script src="https://unpkg.com/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://unpkg.com/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="file"], select, input[type="number"], input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-primary { background-color: #007bff; display: none; }
        
        #loading {
            display: none;
            color: #ffc107;
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }
        #resultContainer {
            margin-top: 25px;
            display: grid;
            gap: 10px;
            justify-content: center;
        }
        .output-img {
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        @media print {
            body { background-color: white; padding: 0; }
            .container { display: none; }
            #resultContainer { margin-top: 0; gap: 5px; }
            .output-img { border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Lite Photo Editor</h2>
    
    <div class="form-group">
        <label for="imageInput">আপনার ছবি সিলেক্ট করুন:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="form-group">
        <label for="bgColor">ব্যাকগ্রাউন্ড কালার:</label>
        <input type="color" id="bgColor" value="#3498db">
    </div>

    <div class="form-group">
        <label for="sizeSelect">ছবির সাইজ:</label>
        <select id="sizeSelect">
            <option value="passport">Passport Size</option>
            <option value="stamp">Stamp Size</option>
        </select>
    </div>

    <div class="form-group">
        <label for="photoCount">ছবির সংখ্যা:</label>
        <input type="number" id="photoCount" min="1" max="10" value="1">
    </div>

    <button class="btn btn-success" onclick="processImage()">ছবি তৈরি করুন</button>
    <button id="printBtn" class="btn btn-primary" onclick="window.print()">ছবি প্রিন্ট করুন</button>
    
    <div id="loading">প্রসেস হচ্ছে... অনুগ্রহ করে কয়েক সেকেন্ড স্ক্রিনে টাচ করবেন না।</div>
</div>

<div id="resultContainer"></div>

<script>
let net = null;

function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
}

async function processImage() {
    const fileInput = document.getElementById('imageInput');
    const bgColorHex = document.getElementById('bgColor').value;
    const sizeSelect = document.getElementById('sizeSelect').value;
    const photoCount = parseInt(document.getElementById('photoCount').value) || 1;
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const printBtn = document.getElementById('printBtn');
    
    if (fileInput.files.length === 0) {
        alert("দয়া করে একটি ছবি আপলোড করুন!");
        return;
    }

    loading.style.display = "block";
    printBtn.style.display = "none";
    resultContainer.innerHTML = "";

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        
        img.onload = async function() {
            try {
                // ফোনের র‍্যাম বাঁচাতে বড় ছবিকে প্রথমেই মনে মনে ছোট (Resize) করে নেওয়া হচ্ছে
                const maxDim = 400; 
                let scale = Math.min(maxDim / img.width, maxDim / img.height);
                if(scale > 1) scale = 1;
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width * scale;
                tempCanvas.height = img.height * scale;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(img, 0, 0, tempCanvas.width, tempCanvas.height);

                // অতি লাইটওয়েট মোডে AI মডেল লোড করা
                if (!net) {
                    net = await bodyPix.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        multiplier: 0.50, // প্রসেসর লোড কমানো হয়েছে
                        quantBytes: 1
                    });
                }

                // দ্রুত সেগমেন্টেশন সম্পন্ন করা
                const segmentation = await net.segmentPerson(tempCanvas, {
                    internalResolution: 'low', // দ্রুত কাজের জন্য লো রেজোলিউশন
                    segmentationThreshold: 0.7
                });

                let width = sizeSelect === "passport" ? 150 : 80;
                let height = sizeSelect === "passport" ? 188 : 100;

                const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const data = imgData.data;
                const rgb = hexToRgb(bgColorHex);

                for (let i = 0; i < segmentation.data.length; i++) {
                    if (segmentation.data[i] === 0) {
                        data[i * 4] = rgb.r;
                        data[i * 4 + 1] = rgb.g;
                        data[i * 4 + 2] = rgb.b;
                    }
                }
                tempCtx.putImageData(imgData, 0, 0);

                // ফাইনাল আউটপুট সাইজ ক্যানভাস
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = width;
                finalCanvas.height = height;
                const finalCtx = finalCanvas.getContext('2d');
                finalCtx.drawImage(tempCanvas, 0, 0, width, height);

                const finalDataUrl = finalCanvas.toDataURL('image/jpeg', 0.9);

                loading.style.display = "none";
                printBtn.style.display = "block";
                resultContainer.style.gridTemplateColumns = `repeat(auto-fill, minmax(${width}px, 1fr))`;

                for (let i = 0; i < photoCount; i++) {
                    const newImg = document.createElement('img');
                    newImg.src = finalDataUrl;
                    newImg.className = "output-img";
                    newImg.style.width = width + "px";
                    newImg.style.height = height + "px";
                    resultContainer.appendChild(newImg);
                }

            } catch (error) {
                console.error(error);
                alert("দুঃখিত, ফোন মেমোরি কম থাকার কারণে প্রসেস করা গেল না।");
                loading.style.display = "none";
            }
        };
    };
    reader.readAsDataURL(file);
}
</script>

</body>
</html>
