<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Background Changer, Resizer & Print</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input[type="file"], select, input[type="number"], input[type="color"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn {
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-primary { background-color: #007bff; display: none; }
        .btn-primary:hover { background-color: #0069d9; }
        
        #loading {
            display: none;
            color: #007bff;
            font-weight: bold;
            margin-top: 15px;
        }
        #resultContainer {
            margin-top: 25px;
            display: grid;
            gap: 10px;
            justify-content: center;
        }
        .output-img {
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        @media print {
            body { background-color: white; padding: 0; }
            .container { display: none; }
            #resultContainer { margin-top: 0; gap: 5px; }
            .output-img { border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Photo Editor & Printer</h2>
    
    <div class="form-group">
        <label for="imageInput">আপনার ছবি সিলেক্ট করুন:</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="form-group">
        <label for="bgColor">নতুন ব্যাকগ্রাউন্ড কালার সিলেক্ট করুন:</label>
        <input type="color" id="bgColor" value="#3498db">
    </div>

    <div class="form-group">
        <label for="sizeSelect">ছবির সাইজ বেছে নিন:</label>
        <select id="sizeSelect">
            <option value="passport">Passport Size (40mm x 50mm)</option>
            <option value="stamp">Stamp Size (20mm x 25mm)</option>
            <option value="custom">Custom (Square - 300x300 px)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="photoCount">ছবির সংখ্যা (কয়টি ছবি চান):</label>
        <input type="number" id="photoCount" min="1" max="20" value="1">
    </div>

    <button class="btn btn-success" onclick="processImage()">ছবি তৈরি করুন</button>
    <button id="printBtn" class="btn btn-primary" onclick="printPhotos()">ছবি প্রিন্ট করুন</button>
    
    <div id="loading">দয়া করে অপেক্ষা করুন, AI প্রথমবার লোড হতে একটু সময় নিতে পারে...</div>
</div>

<div id="resultContainer"></div>

<script>
let net = null;

// Hex কালারকে RGB তে কনভার্ট করার ফাংশন
function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
    } : { r: 0, g: 0, b: 0 };
}

async function processImage() {
    const fileInput = document.getElementById('imageInput');
    const bgColorHex = document.getElementById('bgColor').value;
    const sizeSelect = document.getElementById('sizeSelect').value;
    const photoCount = parseInt(document.getElementById('photoCount').value) || 1;
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const printBtn = document.getElementById('printBtn');
    
    if (fileInput.files.length === 0) {
        alert("দয়া করে প্রথমে একটি ছবি আপলোড করুন!");
        return;
    }

    loading.style.display = "block";
    printBtn.style.display = "none";
    resultContainer.innerHTML = "";

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        
        img.onload = async function() {
            try {
                // বডি-পিক্স মডেল লোড করা (যদি আগে থেকে না থাকে)
                if (!net) {
                    net = await bodyPix.load({
                        architecture: 'MobileNetV1',
                        outputStride: 16,
                        multiplier: 0.75,
                        quantBytes: 2
                    });
                }

                // ছবিতে মানুষ বা অবজেক্ট ডিটেক্ট করা
                const segmentation = await net.segmentPerson(img, {
                    internalResolution: 'high',
                    segmentationThreshold: 0.7
                });

                // নতুন সাইজ সেট করা
                let width, height;
                if (sizeSelect === "passport") {
                    width = 150; height = 188; 
                } else if (sizeSelect === "stamp") {
                    width = 80; height = 100;
                } else {
                    width = 200; height = 200; 
                }

                // প্রথম ক্যানভাসে ছবি এবং ব্যাকগ্রাউন্ড রিমুভাল প্রসেস করা
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                const imgData = ctx.getImageData(0, 0, img.width, img.height);
                const data = imgData.data;
                const rgb = hexToRgb(bgColorHex);

                // পিক্সেল বাই পিক্সেল ব্যাকগ্রাউন্ড কালার রিপ্লেস করা
                for (let i = 0; i < segmentation.data.length; i++) {
                    // যদি পিক্সেলটি ব্যাকগ্রাউন্ড হয় (0 মানে ব্যাকগ্রাউন্ড)
                    if (segmentation.data[i] === 0) {
                        data[i * 4] = rgb.r;     // Red
                        data[i * 4 + 1] = rgb.g; // Green
                        data[i * 4 + 2] = rgb.b; // Blue
                    }
                }
                ctx.putImageData(imgData, 0, 0);

                // দ্বিতীয় ক্যানভাসে সাইজ ছোট/বড় (Resize) করা
                const resizeCanvas = document.createElement('canvas');
                resizeCanvas.width = width;
                resizeCanvas.height = height;
                const resizeCtx = resizeCanvas.getContext('2d');
                resizeCtx.drawImage(canvas, 0, 0, width, height);

                const finalDataUrl = resizeCanvas.toDataURL('image/jpeg');

                // স্ক্রিনে ছবিগুলো দেখানো
                loading.style.display = "none";
                printBtn.style.display = "block";
                resultContainer.style.gridTemplateColumns = `repeat(auto-fill, minmax(${width}px, 1fr))`;

                for (let i = 0; i < photoCount; i++) {
                    const newImg = document.createElement('img');
                    newImg.src = finalDataUrl;
                    newImg.className = "output-img";
                    newImg.style.width = width + "px";
                    newImg.style.height = height + "px";
                    resultContainer.appendChild(newImg);
                }

            } catch (error) {
                console.error(error);
                alert("প্রসেস করতে সমস্যা হয়েছে। ছবিটির সাইজ ছোট করে বা অন্য ছবি দিয়ে চেষ্টা করুন।");
                loading.style.display = "none";
            }
        };
    };
    reader.readAsDataURL(file);
}

function printPhotos() {
    window.print();
}
</script>

</body>
</html>
