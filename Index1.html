<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Photo Editor & Printer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        h2 { color: #1a1a1a; margin-bottom: 20px; font-size: 24px; }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a4a4a;
            font-size: 14px;
        }
        input[type="file"], select, input[type="number"], input[type="color"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn {
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-success { background-color: #00aa6c; }
        .btn-success:hover { background-color: #008f5a; }
        .btn-primary { background-color: #007bff; display: none; }
        .btn-primary:hover { background-color: #0056b3; }
        
        #loading {
            display: none;
            color: #ffffff;
            background: #222222;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
        #resultContainer {
            margin-top: 30px;
            display: grid;
            gap: 12px;
            justify-content: center;
        }
        .output-img {
            border: 1px solid #eee;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            object-fit: cover;
        }
        @media print {
            body { background-color: white; padding: 0; }
            .container { display: none; }
            #resultContainer { margin-top: 0; gap: 8px; }
            .output-img { border: none; box-shadow: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>HD Photo Editor (Studio Quality)</h2>
    
    <div class="form-group">
        <label id="fileLabel" for="imageInput">আপনার ছবি সিলেক্ট করুন (যেকোনো সাইজ):</label>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div class="form-group">
        <label for="bgColor">ব্যাকগ্রাউন্ড কালার সিলেক্ট করুন:</label>
        <input type="color" id="bgColor" value="#3498db">
    </div>

    <div class="form-group">
        <label for="sizeSelect">ছবির সাইজ:</label>
        <select id="sizeSelect">
            <option value="passport">Passport Size (Studio Standard)</option>
            <option value="stamp">Stamp Size</option>
        </select>
    </div>

    <div class="form-group">
        <label for="photoCount">ছবির সংখ্যা (কপি):</label>
        <input type="number" id="photoCount" min="1" max="12" value="1">
    </div>

    <button class="btn btn-success" onclick="processImageHD()">ম্যাজিক ব্যাকগ্রাউন্ড চেঞ্জ</button>
    <button id="printBtn" class="btn btn-primary" onclick="window.print()">ছবি প্রিন্ট করুন</button>
    
    <div id="loading">HD ব্যাকগ্রাউন্ড রিমুভ হচ্ছে... মাত্র কয়েক সেকেন্ড অপেক্ষা করুন।</div>
</div>

<div id="resultContainer"></div>

<script>
function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 0, g: 0, b: 0 };
}

async function processImageHD() {
    const fileInput = document.getElementById('imageInput');
    const bgColorHex = document.getElementById('bgColor').value;
    const sizeSelect = document.getElementById('sizeSelect').value;
    const photoCount = parseInt(document.getElementById('photoCount').value) || 1;
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const printBtn = document.getElementById('printBtn');
    
    if (fileInput.files.length === 0) {
        alert("দয়া করে একটি ছবি আপলোড করুন!");
        return;
    }

    loading.style.display = "block";
    printBtn.style.display = "none";
    resultContainer.innerHTML = "";

    const file = fileInput.files[0];
    
    // নিখুঁত কাটিংয়ের জন্য ক্লাউড এপিআই-তে ফাইল পাঠানো হচ্ছে (হ্যাং হওয়া বন্ধ করতে)
    const formData = new FormData();
    formData.append('file', file);

    try {
        // ফ্রি হাই-কোয়ালিটি ব্যাকগ্রাউন্ড রিমুভাল এপিআই (AI Powered)
        const response = await fetch('https://api.brg.im/remove', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            throw new Error('API Error');
        }

        const blob = await response.blob();
        const imgUrl = URL.createObjectURL(blob);
        
        const img = new Image();
        img.src = imgUrl;
        
        img.onload = function() {
            // স্টুডিও স্ট্যান্ডার্ড পাসপোর্ট ও স্ট্যাম্প সাইজ অনুপাত
            let width = sizeSelect === "passport" ? 150 : 80;
            let height = sizeSelect === "passport" ? 188 : 100;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // আপনার পছন্দের ব্যাকগ্রাউন্ড কালার নিখুঁতভাবে বসানো
            ctx.fillStyle = bgColorHex;
            ctx.fillRect(0, 0, width, height);

            // কাটা ছবিটিকে সুন্দরভাবে ফিট করা
            ctx.drawImage(img, 0, 0, width, height);

            const finalDataUrl = canvas.toDataURL('image/jpeg', 1.0); // 1.0 মানে ফুল HD কোয়ালিটি

            loading.style.display = "none";
            printBtn.style.display = "block";
            resultContainer.style.gridTemplateColumns = `repeat(auto-fill, minmax(${width}px, 1fr))`;

            for (let i = 0; i < photoCount; i++) {
                const newImg = document.createElement('img');
                newImg.src = finalDataUrl;
                newImg.className = "output-img";
                newImg.style.width = width + "px";
                newImg.style.height = height + "px";
                resultContainer.appendChild(newImg);
            }
        };

    } catch (error) {
        console.error(error);
        alert("দুঃখিত, কোনো সমস্যা হয়েছে। দয়া করে আপনার ইন্টারনেট কানেকশন চেক করে আবার চেষ্টা করুন।");
        loading.style.display = "none";
    }
}
</script>

</body>
</html>
